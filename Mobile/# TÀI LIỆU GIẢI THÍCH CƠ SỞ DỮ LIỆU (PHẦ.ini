# TÀI LIỆU GIẢI THÍCH CƠ SỞ DỮ LIỆU (PHẦN 6: HỆ THỐNG THÔNG BÁO)
---

## 11. HỆ THỐNG THÔNG BÁO ĐA ĐIỂM (`notifications` & `notification_read_status`)



**Vấn đề:** Khi gửi 1 thông báo cho 1.000 người, nếu lưu thẳng tên người nhận vào bảng thông báo thì ta phải copy nội dung tin nhắn đó ra 1.000 dòng $\rightarrow$ Rất tốn bộ nhớ và khó sửa nội dung.

**Giải pháp:** Tách làm 2 bảng (Quan hệ 1-N):
1.  **Bảng `notifications`:** Chỉ lưu nội dung tin nhắn (1 dòng duy nhất).
2.  **Bảng `notification_read_status`:** Lưu trạng thái đã đọc/chưa đọc của từng người (1.000 dòng tham chiếu).

---

### Bảng 11.1: Nội dung thông báo (`notifications`)
**Chức năng:** Chứa "xác" của thông báo (Tiêu đề, nội dung, gửi cho nhóm nào).

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `tieu_de` | Tiêu đề ngắn gọn (Sẽ hiện trên thanh Notification của điện thoại). |
| `noi_dung` | Nội dung đầy đủ chi tiết. |
| `loai_thong_bao` | Phân loại icon hiển thị (Vd: `lich_hop` 📅, `tien_phi` 💰, `khan_cap` 🚨). |
| `doi_tuong_nhan`| **(Cơ chế định tuyến - Routing)**: <br>- `tat_ca`: Gửi toàn trường.<br>- `chi_bo`: Gửi riêng cho 1 chi bộ (kết hợp với `chi_bo_id`).<br>- `dang_bo`: Gửi riêng cho 1 đảng bộ (kết hợp với `dang_bo_id`). |
| `uu_tien` | `khan_cap` (Rung mạnh/Đổ chuông), `thuong` (Thông báo nhẹ). |
| `trang_thai` | `nhap` (Soạn chưa gửi), `da_gui` (Đã push đi), `da_thu_hoi` (Lỡ gửi sai thì bấm thu hồi, user không đọc được nữa). |

### Bảng 11.2: Trạng thái đọc (`notification_read_status`)
**Chức năng:** Cái "Dấu tích xanh". Theo dõi cụ thể từng User.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `notification_id`| Thông báo nào? (Link sang bảng `notifications`). |
| `user_id` | Gửi cho User nào? (Link sang bảng `users`). |
| `is_read` | **(Quan trọng)** <br>- `0`: Chưa đọc (Trên App hiện chấm đỏ 🔴 trên quả chuông).<br>- `1`: Đã đọc (Mất chấm đỏ). |
| `read_at` | Thời điểm user bấm vào xem tin (Để thống kê ai hay xem tin chậm). |

---

### ⚙️ CƠ CHẾ HOẠT ĐỘNG (LOGIC FLOW)



Quy trình gửi tin không đơn giản là Insert, mà Backend cần xử lý theo luồng **Fan-out** như sau:

#### BƯỚC 1: Admin soạn và gửi tin (Create)
* Admin vào trang quản trị, soạn: "Nhắc nhở đóng phí tháng 2".
* Chọn đối tượng: "Gửi cho Chi bộ Sinh viên 1".
* Bấm **[GỬI]**.
* $\rightarrow$ Hệ thống tạo **1 dòng** trong bảng `notifications`.

#### BƯỚC 2: Hệ thống phân phối (Distribute)
* Backend chạy ngầm (Background Job):
    1.  Đọc bảng `notifications`, thấy gửi cho "Chi bộ SV 1".
    2.  Tìm trong bảng `party_members` xem Chi bộ này có bao nhiêu người (Ví dụ: 30 người).
    3.  Tự động **Insert 30 dòng** vào bảng `notification_read_status` (mỗi dòng ứng với 1 User ID, mặc định `is_read = 0`).
    4.  Gửi tín hiệu đến Firebase/Apple/Google để điện thoại của 30 người này rung lên.

#### BƯỚC 3: User đọc tin (Update Status)
* Ông A mở App, thấy icon quả chuông có số (1).
* Ông A bấm vào xem chi tiết.
* App gọi API lên Server: *"Ông A đã xem tin này rồi nhé"*.
* Server cập nhật dòng của ông A trong bảng `notification_read_status` thành `is_read = 1`.
* *Kết quả:* Mất chấm đỏ trên máy ông A (máy người khác chưa đọc vẫn còn đỏ).


