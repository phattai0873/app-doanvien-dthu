# TÀI LIỆU GIẢI THÍCH CƠ SỞ DỮ LIỆU (PHẦN 1: CƠ CẤU TỔ CHỨC)
---

Phần này định nghĩa cấu trúc phân cấp của tổ chức Đảng, đi từ cấp quản lý cao nhất xuống đến từng đảng viên cụ thể.

## 1. BẢNG ĐẢNG BỘ (`party_committees`)
**Chức năng:** Lưu trữ thông tin các đơn vị cấp trên (Cấp quản lý).
* **Ví dụ thực tế:** Đảng bộ Trường Đại học, Đảng bộ Khoa CNTT.
* **Vai trò:** Quản lý các Chi bộ trực thuộc.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `id` | Khóa chính (Dùng để code link dữ liệu). |
| `ma_dang_bo` | Mã định danh văn bản (Vd: "DB-CNTT"). Dùng để in trên báo cáo. |
| `ten_dang_bo` | Tên đầy đủ của tổ chức. |
| `cap_uy` | Phân loại cấp độ (Vd: "Cấp cơ sở", "Cấp trên cơ sở"). |
| `bi_thu_id` | **(Lãnh đạo)**: ID của người đứng đầu Đảng bộ (Link sang bảng Đảng viên). |
| `so_chi_bo_truc_thuoc` | Số lượng chi bộ con (Thường dùng để thống kê nhanh). |
| `is_active` | 1: Đang hoạt động. 0: Đã giải thể hoặc sáp nhập. |

---

## 2. BẢNG CHI BỘ (`party_cells`)
**Chức năng:** Lưu trữ thông tin đơn vị cơ sở (Nơi sinh hoạt trực tiếp).
* **Ví dụ thực tế:** Chi bộ Sinh viên 1, Chi bộ Giảng viên.
* **Vai trò:** Nơi diễn ra các hoạt động thực tế (Họp hành, thu phí, kết nạp).

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `ma_chi_bo` | Mã định danh (Vd: "CB-SV01"). |
| `dang_bo_id` | **(Quan trọng)** Xác định chi bộ này thuộc Đảng bộ nào quản lý (Link sang bảng `party_committees`). |
| `don_vi_truc_thuoc` | Đơn vị chuyên môn gắn liền (Vd: Lớp KTPM K18). |
| `bi_thu_id` | **(Bí thư Chi bộ)**: Người chịu trách nhiệm tổ chức họp và duyệt các yêu cầu trên App. |
| `so_dang_vien` | Tổng số đảng viên hiện có trong chi bộ. |

---

## 3. BẢNG ĐẢNG VIÊN (`party_members`)
**Chức năng:** Hồ sơ nhân sự gốc (Profile).
* **Lưu ý:** Bảng này lưu thông tin "Con người" (Họ tên, ngày sinh...), tách biệt với bảng `users` (lưu tài khoản đăng nhập).

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `ma_dang_vien` | Số thẻ Đảng viên (Dùng để in thẻ, định danh quốc gia). |
| `ho_ten`, `ngay_sinh`... | Thông tin cá nhân cơ bản. |
| `ngay_vao_dang` | Ngày kết nạp lần đầu (Bắt đầu tính tuổi Đảng). |
| `ngay_chinh_thuc` | Ngày công nhận chính thức (Sau 12 tháng dự bị). |
| `chi_bo_id` | **(Quan trọng)** Xác định đảng viên này đang sinh hoạt tại Chi bộ nào. |
| `chuc_vu_dang` | **(Hiển thị)** Lưu tên chức vụ chính (Vd: "Bí thư") để hiển thị nhanh trên danh sách mà không cần join bảng. |
| `trinh_do_ly_luan...` | Trình độ chính trị (Sơ cấp, Trung cấp, Cao cấp). |
| `is_active` | 1: Đang sinh hoạt. 0: Đã chuyển đi hoặc ra khỏi Đảng. |

---

### 🔗 MÔ HÌNH QUAN HỆ (RELATIONSHIP FLOW)

Để dễ hình dung khi code API:

1.  **Cấp 1 (Đảng bộ):** Một `party_committees` quản lý nhiều `party_cells`.
2.  **Cấp 2 (Chi bộ):** Một `party_cells` quản lý nhiều `party_members`.
3.  **Cấp 3 (Đảng viên):** Một `party_members` chỉ thuộc về 1 `party_cells` tại một thời điểm.

**Ví dụ truy vấn:**
* Muốn biết "Ông A thuộc Đảng bộ nào?", ta phải đi đường vòng:
    * Từ Ông A $\rightarrow$ Tìm Chi bộ của ông ấy (`chi_bo_id`) $\rightarrow$ Từ Chi bộ đó tìm lên Đảng bộ (`dang_bo_id`).


# TÀI LIỆU GIẢI THÍCH CƠ SỞ DỮ LIỆU (PHẦN 2: TÀI KHOẢN & PHÂN QUYỀN)
---

## 4. BẢNG TÀI KHOẢN HỆ THỐNG (`users`)
**Chức năng:** Quản lý đăng nhập và bảo mật App.
* **Quy tắc:** Tách riêng với bảng `party_members`. Một Đảng viên (Person) chỉ có 1 Tài khoản (Account).
* **Lý do tách bảng:** Để bảo mật mật khẩu và quản lý trạng thái online/offline, khóa nick mà không ảnh hưởng đến hồ sơ lý lịch.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `dang_vien_id` | **(Liên kết)** Tài khoản này thuộc về ông Đảng viên nào? (Link sang bảng `party_members`). |
| `username` | Tên đăng nhập (Vd: số thẻ đảng, hoặc email). |
| `password_hash` | **(Bảo mật)** Mật khẩu đã mã hóa. Tuyệt đối không lưu password thô (plain text). |
| `vai_tro` | **(Quyền Kỹ thuật)**: Phân quyền trên App (Vd: `admin` - quản trị hệ thống, `user` - người dùng thường). <br>*Lưu ý:* Khác với chức vụ Đảng (Bí thư/Phó bí thư). |
| `token_device` | **(Thông báo)** Mã thiết bị (Firebase Token). Dùng để gửi thông báo đẩy (Push Notification) đến đúng điện thoại của người này. |
| `is_locked` | **(Chống Hack)** = 1 nghĩa là tài khoản đang bị khóa tạm thời do nhập sai pass quá nhiều lần. |

---

## 5. HỆ THỐNG CHỨC VỤ ĐỘNG (DYNAMIC POSITIONS)
Thay vì lưu cứng chức vụ vào bảng nhân sự, hệ thống dùng mô hình **1 người - N chức vụ**.

### 5.1. Bảng Danh mục chức vụ (`party_positions`)
**Chức năng:** Là cái "Thực đơn" (Menu) định nghĩa các chức vụ có trong tổ chức.
* **Bản chất:** Dữ liệu tĩnh, ít thay đổi. Không chứa tên người.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `ten_chuc_vu` | Tên gọi (Vd: Bí thư, Phó Bí thư, Chi ủy viên, Đảng viên). |
| `cap_hoat_dong` | Phạm vi (Vd: 'CHI_BO' - Chức này chỉ có ở chi bộ, 'DANG_BO' - Chức này ở cấp trên). |

### 5.2. Bảng Phân công chức vụ (`party_member_positions`) - **QUAN TRỌNG**
**Chức năng:** Là "Quyết định bổ nhiệm". Bảng này gán một người vào một chức vụ cụ thể tại một đơn vị cụ thể.
* **Giải quyết bài toán Kiêm nhiệm:** Nếu ông A giữ 3 chức vụ, bảng này sẽ có 3 dòng chứa `dang_vien_id` của ông A.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `dang_vien_id` | Ai được bổ nhiệm? (Link sang `party_members`). |
| `chuc_vu_id` | Giữ chức gì? (Link sang `party_positions`). |
| `chi_bo_id` | **(Logic chọn 1 trong 2)**: Nếu giữ chức tại Chi bộ thì điền ID vào đây, cột dưới để NULL. |
| `dang_bo_id` | **(Logic chọn 1 trong 2)**: Nếu giữ chức tại Đảng bộ cấp trên thì điền ID vào đây, cột trên để NULL. |
| `ngay_bo_nhiem` | Ngày bắt đầu nhiệm kỳ. |
| `ngay_ket_thuc` | **(Lịch sử)**: Nếu hết nhiệm kỳ, cập nhật ngày kết thúc vào đây chứ KHÔNG XÓA dòng này. Giúp tra cứu lịch sử công tác. |
| `trang_thai` | 1: Đang đương nhiệm. 0: Đã mãn nhiệm. |

---

### ⚙️ VÍ DỤ MINH HỌA (USE CASE)

**Tình huống:** Đồng chí **Nguyễn Văn A** vừa là **Bí thư Chi bộ Sinh viên 1**, vừa là **Ủy viên BCH Đảng bộ Khoa**.

Dữ liệu trong bảng `party_member_positions` sẽ có 2 dòng:

1.  **Dòng 1 (Chức Bí thư):**
    * `dang_vien_id`: Ông A
    * `chuc_vu_id`: Bí thư
    * `chi_bo_id`: Chi bộ SV 1
    * `dang_bo_id`: NULL

2.  **Dòng 2 (Chức Ủy viên):**
    * `dang_vien_id`: Ông A
    * `chuc_vu_id`: Ủy viên
    * `chi_bo_id`: NULL
    * `dang_bo_id`: Đảng bộ Khoa

=> **Kết quả trên App:** Khi ông A đăng nhập, App kiểm tra bảng này thấy ông có quyền quản lý cả Chi bộ lẫn Đảng bộ -> Hiển thị đầy đủ Menu chức năng của cả 2 cấp.


# TÀI LIỆU GIẢI THÍCH CƠ SỞ DỮ LIỆU (PHẦN 3: SINH HOẠT & ĐIỂM DANH)
---

Phần này mô tả quy trình tổ chức một buổi sinh hoạt Chi bộ, từ lúc lên lịch cho đến lúc điểm danh và kết thúc cuộc họp.

## 6. BẢNG SINH HOẠT CHI BỘ (`cell_meetings`)
**Chức năng:** Quản lý sự kiện cuộc họp.
* **Tương tự:** Giống như tạo một "Event" trên Google Calendar, nhưng có thêm các thuộc tính quản lý nhà nước.
* **Quy tắc:** Một Chi bộ có thể tổ chức nhiều cuộc họp (Mối quan hệ 1-N).

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `chi_bo_id` | **(Chủ sở hữu)** Xác định cuộc họp này của Chi bộ nào (Link sang `party_cells`). Chi bộ A không được nhìn thấy lịch họp của Chi bộ B. |
| `tieu_de` | Tên cuộc họp (Vd: "Sinh hoạt định kỳ Tháng 3/2026"). |
| `noi_dung` | Agenda/Chương trình họp dự kiến. |
| `dia_diem` | Tên phòng họp (Vd: "Phòng 202"). |
| `chu_tri_id` | **(Vai trò)** ID người chủ trì (Thường là Bí thư). |
| `thu_ky_id` | **(Vai trò)** ID người ghi biên bản (Thư ký cuộc họp). |
| `so_thanh_vien...` | Số người tham gia thực tế (App tự động đếm sau khi điểm danh xong). |
| `bien_ban` | Link file biên bản cuộc họp (Word/PDF) được upload sau khi họp xong. |
| `trang_thai` | **(Logic App - Quan trọng):** <br>- `sap_dien_ra`: Cho phép xem lịch.<br>- `dang_dien_ra`: Cho phép quét QR điểm danh.<br>- `da_ket_thuc`: Khóa điểm danh, chỉ cho xem biên bản. |

*Lưu ý Dev:* Trong code SQL, nhớ thêm dấu phẩy `,` sau dòng `chi_bo_id INT NOT NULL` nhé.

---

## 7. BẢNG ĐIỂM DANH (`meeting_attendance`)
**Chức năng:** Lưu trữ kết quả tham gia của từng cá nhân.
* **Bản chất:** Bảng trung gian giải quyết mối quan hệ Nhiều-Nhiều giữa `cell_meetings` và `party_members`.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `sinh_hoat_id` | Điểm danh cho cuộc họp nào? |
| `dang_vien_id` | Điểm danh cho ai? |
| `trang_thai` | **(Kết quả):** <br>- `vang`: Mặc định ban đầu.<br>- `co_mat`: Khi quét QR thành công.<br>- `vang_co_phep`: Nếu có đơn xin phép được duyệt.<br>- `vang_khong_phep`: Không đi, không báo. |
| `ly_do_vang` | Ghi chú lý do vắng (Vd: "Đi công tác", "Ốm"). |

---

### ⚙️ QUY TRÌNH HOẠT ĐỘNG (LOGIC FLOW)

Để tính năng điểm danh hoạt động trơn tru, Backend cần xử lý theo luồng sau:

#### BƯỚC 1: Khởi tạo danh sách (Khi tạo cuộc họp)
Ngay khi Bí thư bấm "Tạo cuộc họp", hệ thống phải làm 2 việc:
1.  Insert 1 dòng vào bảng `cell_meetings`.
2.  **Quan trọng:** Tự động lấy danh sách tất cả Đảng viên đang hoạt động (`is_active=1`) của Chi bộ đó, và Insert hàng loạt vào bảng `meeting_attendance` với trạng thái mặc định là `vang`.
    * *Mục đích:* Để biết tổng sĩ số ngay từ đầu, ai chưa đến thì hiện "Vắng".

#### BƯỚC 2: Check-in (Trong cuộc họp)
1.  Bí thư chuyển trạng thái cuộc họp sang `dang_dien_ra`.
2.  App của Bí thư hiện mã QR Code (chứa ID cuộc họp).
3.  Đảng viên dùng App quét mã QR.
4.  Server nhận tín hiệu $\rightarrow$ Update dòng tương ứng trong bảng `meeting_attendance` từ `vang` thành `co_mat`.

#### BƯỚC 3: Tổng kết (Sau cuộc họp)
1.  Bí thư bấm "Kết thúc cuộc họp".
2.  Hệ thống đếm số lượng dòng `co_mat` trong bảng `meeting_attendance` và cập nhật ngược lại vào cột `so_thanh_vien_tham_gia` trong bảng `cell_meetings`.


## MODULE B: TÀI CHÍNH & ĐẢNG PHÍ (`party_fees`)

Đây là tính năng chuyển đổi số thay thế sổ thu chi truyền thống.



# TÀI LIỆU GIẢI THÍCH CƠ SỞ DỮ LIỆU (PHẦN 4: THI ĐUA & TÀI CHÍNH)
---

## MODULE A: THI ĐUA & TRẮC NGHIỆM (DYNAMIC QUIZ)

Đây là module có cấu trúc phức tạp nhất về mặt logic quan hệ (Relationship), được thiết kế theo mô hình **1-N (Một - Nhiều)** lồng nhau 3 cấp.



### 1. BẢNG ĐỀ THI (`quiz_exams`)
**Chức năng:** Chứa thông tin tổng quan của một đợt thi.
* **Tương tự:** Cái "bìa" của đề thi.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `tieu_de` | Tên cuộc thi (Vd: "Tìm hiểu Nghị quyết TW8"). |
| `thoi_gian_lam_bai` | Đồng hồ đếm ngược (Vd: 15 phút). Hết giờ hệ thống tự thu bài. |
| `diem_dat_yeu_cau` | Mốc điểm sàn (Vd: 5/10 điểm). Dưới mức này là "Không đạt". |
| `is_active` | **(Công tắc):** Admin bật lên 1 thì App mới hiện đề thi. Tắt về 0 là đóng thi. |
| `ngay_bat_dau/ket_thuc` | Khoảng thời gian diễn ra cuộc thi. |

### 2. BẢNG CÂU HỎI (`quiz_questions`)
**Chức năng:** Chứa nội dung câu hỏi.
* **Lưu ý:** Bảng này KHÔNG lưu đáp án A, B, C.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `exam_id` | Câu hỏi này thuộc về đề thi nào? |
| `noi_dung_cau_hoi` | Text câu hỏi (Vd: "Ngày thành lập Đảng?"). |
| `loai_cau_hoi` | `trac_nghiem` (Chọn 1), `checkbox` (Chọn nhiều - tính năng nâng cao). |
| `diem_so` | Trọng số điểm (Câu khó 2 điểm, câu dễ 1 điểm). |
| `giai_thich` | **(Feedback):** Hiển thị lời giải thích sau khi user xem lại bài thi. |

### 3. BẢNG LỰA CHỌN (`quiz_options`)
**Chức năng:** Chứa các phương án trả lời. Tạo nên sự linh hoạt (Một câu hỏi có thể có 2, 3, 4 hoặc n lựa chọn).

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `question_id` | Lựa chọn này thuộc câu hỏi nào? |
| `noi_dung_lua_chon`| Nội dung (Vd: "1930", "1945"...). |
| `la_dap_an_dung` | **(Đáp án):** <br>- `1`: Đây là câu đúng.<br>- `0`: Đây là câu sai.<br>Backend dùng cột này để so sánh và chấm điểm. |

### 4. BẢNG KẾT QUẢ (`quiz_attempts`)
**Chức năng:** Bảng điểm (Scoreboard). Lưu lịch sử thi của Đảng viên.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `dang_vien_id` | Ai thi? |
| `exam_id` | Thi bài nào? |
| `tong_diem` | Điểm số đạt được. |
| `ket_qua` | `DAT` hoặc `KHONG_DAT` (So sánh tổng điểm với `diem_dat_yeu_cau`). |

