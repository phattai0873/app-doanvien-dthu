# TÀI LIỆU GIẢI THÍCH QUY TRÌNH VẬN HÀNH (LOGIC FLOW)
## MODULE: THI ĐUA & TRẮC NGHIỆM (Quiz System)
---

Phần này mô tả luồng dữ liệu đi như thế nào từ lúc Admin soạn đề cho đến khi Đảng viên nhận được điểm số.

### QUY TRÌNH 1: SOẠN ĐỀ THI (Dành cho Admin/Bí thư)
*Cơ chế:* Dữ liệu được thêm vào theo cấu trúc "Thác nước" (Waterfall) qua 3 bảng liên tiếp.

1.  **Bước 1: Tạo vỏ đề thi**
    * Admin nhập: "Tìm hiểu Điều lệ Đảng", thời gian 15 phút.
    * Hệ thống `INSERT` vào bảng `quiz_exams`.
    * *Kết quả:* Sinh ra một đề thi có `ID = 10`.

2.  **Bước 2: Tạo câu hỏi**
    * Admin nhập: "Đảng thành lập năm nào?".
    * Hệ thống `INSERT` vào bảng `quiz_questions` với `exam_id = 10`.
    * *Kết quả:* Sinh ra câu hỏi có `ID = 50`.

3.  **Bước 3: Tạo đáp án (Quan trọng)**
    * Admin nhập lần lượt 4 đáp án A, B, C, D.
    * Hệ thống `INSERT` 4 dòng vào bảng `quiz_options` với `question_id = 50`.
    * Trong đó, dòng chứa đáp án đúng (Vd: "1930") sẽ được set `la_dap_an_dung = 1`.

---

### QUY TRÌNH 2: LÀM BÀI THI (Dành cho Đảng viên/App User)
*Cơ chế:* Bảo mật đáp án tuyệt đối.

1.  **Bước 1: Lấy đề thi**
    * User bấm "Bắt đầu thi".
    * App gọi API lấy danh sách câu hỏi.
    * **Lưu ý bảo mật:** Server chỉ trả về nội dung câu hỏi và các lựa chọn. Tuyệt đối **KHÔNG** trả về cột `la_dap_an_dung` xuống App (để tránh user biết code soi được đáp án).

2.  **Bước 2: Nộp bài (Submit)**
    * User chọn đáp án A cho câu 1, đáp án C cho câu 2...
    * App đóng gói danh sách câu trả lời gửi về Server:
      ```json
      {
        "exam_id": 10,
        "answers": [
          { "question_id": 50, "option_id_selected": 101 },
          { "question_id": 51, "option_id_selected": 104 }
        ]
      }
      ```

---

### QUY TRÌNH 3: CHẤM ĐIỂM TỰ ĐỘNG (Backend xử lý)
*Cơ chế:* So khớp và tính toán ngay lập tức (Real-time scoring).

1.  **Bước 1: So đáp án**
    * Server nhận được `option_id_selected` từ User.
    * Server tra cứu trong Database bảng `quiz_options` xem ID đó có `la_dap_an_dung == 1` hay không.

2.  **Bước 2: Tính điểm**
    * Nếu đúng: Cộng điểm (Vd: 10 câu, đúng 1 câu cộng 1 điểm).
    * Nếu sai: 0 điểm.

3.  **Bước 3: Lưu kết quả & Xếp hạng**
    * Tổng điểm cuối cùng được lưu vào bảng `quiz_attempts` cùng với thời gian nộp bài.
    * Dựa vào `diem_dat_yeu_cau` của đề thi (Vd: 5 điểm), hệ thống gán nhãn `ket_qua` là `'DAT'` hoặc `'KHONG_DAT'`.

4.  **Bước 4: Phản hồi**
    * App hiện ngay thông báo: *"Chúc mừng đồng chí! Đạt 9/10 điểm."*
    * (Tùy chọn) App hiện nút "Xem lại bài thi" để hiển thị lời giải thích (cột `giai_thich` trong bảng `quiz_questions`).

