### ⚙️ QUY TRÌNH HOẠT ĐỘNG (LOGIC FLOW)



Quy trình này mô phỏng giống các nền tảng đăng ký sự kiện (như Ticketbox hay Google Forms):

#### BƯỚC 1: Phát động phong trào (Admin)
* Admin tạo hoạt động mới: "Ngày chủ nhật xanh".
* Set trạng thái là `dang_mo_dang_ky`.
* App gửi thông báo (Notification) đến toàn thể Đảng viên.

#### BƯỚC 2: Đăng ký tham gia (User)
* Đảng viên A mở App, thấy sự kiện hay $\rightarrow$ Bấm nút **[ĐĂNG KÝ THAM GIA]**.
* Hệ thống tạo 1 dòng trong bảng `activity_registrations` với trạng thái `da_dang_ky`.
* Hệ thống tăng biến đếm `so_nguoi_tham_gia` trong bảng `volunteer_activities` lên +1.

#### BƯỚC 3: Điểm danh tại chỗ (Check-in)
* Đến ngày diễn ra, Ban tổ chức mở App quét QR Code của người tham gia.
* Hệ thống cập nhật cột `diem_danh` thành `co_mat`.

#### BƯỚC 4: Tổng kết & Khen thưởng
* Cuối năm, hệ thống có thể truy vấn bảng này để thống kê: *"Đồng chí A đã tham gia 5 hoạt động tình nguyện, đạt thành tích xuất sắc"*.


