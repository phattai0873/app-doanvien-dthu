## 15. BẢNG LỊCH SỬ THAY ĐỔI (`audit_logs`)
**Chức năng:** Ghi lại mọi vết tích thay đổi dữ liệu trong hệ thống.
* **Vai trò:** Giống như "Camera giám sát". Giúp truy vết khi xảy ra lỗi hoặc có dấu hiệu gian lận.

| Tên Cột | Giải thích Ý nghĩa & Nghiệp vụ |
| :--- | :--- |
| `table_name` | Tên bảng bị tác động (Vd: `party_members`, `party_fees`). |
| `record_id` | ID của dòng dữ liệu bị sửa. |
| `action` | Hành động: <br>- `INSERT`: Thêm mới.<br>- `UPDATE`: Chỉnh sửa.<br>- `DELETE`: Xóa. |
| `old_values` | **(Quan trọng - JSON):** Giá trị cũ *trước khi* sửa. Lưu dạng chuỗi JSON để tiết kiệm cột. |
| `new_values` | Giá trị mới *sau khi* sửa. |
| `user_id` | **(Thủ phạm):** Ai là người thực hiện hành động này? |
| `ip_address` | Địa chỉ IP máy tính thực hiện (Để biết sửa từ nhà hay từ cơ quan). |

---

### ⚙️ VÍ DỤ MINH HỌA (USE CASE)



**Tình huống:** Admin A vào sửa số điện thoại của Đảng viên B từ `090123` thành `090999`.

Hệ thống sẽ âm thầm tạo 1 dòng trong `audit_logs` như sau:

* **Action:** `UPDATE`
* **Table:** `party_members`
* **User:** Admin A
* **Old Values (JSON):** `{"so_dien_thoai": "090123"}`
* **New Values (JSON):** `{"so_dien_thoai": "090999"}`

$\rightarrow$ **Tác dụng:** Sau này nếu có tranh chấp, chỉ cần mở bảng này ra là biết ngay ai sửa, sửa lúc mấy giờ, sửa cái gì.

---

### 💡 LỜI KHUYÊN CHO ĐỘI DEV (TECHNICAL NOTE)
Để ghi log vào bảng này, các bạn có 2 cách:
1.  **Cách 1 (Dùng Code Backend - Khuyên dùng):** Trong các hàm API `Create`, `Update`, `Delete`, viết thêm 1 đoạn code nhỏ để Insert vào bảng `audit_logs`. Cách này dễ kiểm soát.
2.  **Cách 2 (Dùng SQL Trigger):** Viết Trigger trong SQL Server. Cách này tự động hoàn toàn nhưng khó debug nếu code bị lỗi. **Với đồ án sinh viên, nên dùng Cách 1 cho đơn giản.**